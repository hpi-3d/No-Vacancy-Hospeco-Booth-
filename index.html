<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 13px;
      font-family: system-ui, sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="info">drag to rotate · scroll to zoom · right-click to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ── Renderer ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;   // soft edges
renderer.toneMapping = THREE.ACESFilmicToneMapping;  // cinematic color
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.Fog(0x0d1117, 30, 100);       // depth fog

// ── Camera ────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 500);
camera.position.set(6, 4, 6);

// ── Controls ──────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.5;
controls.maxDistance = 100;
controls.maxPolarAngle = Math.PI / 2.05;  // stop going underground

// ── Lighting ──────────────────────────────────────────────

// 1. Hemisphere: sky colour above, ground bounce below
const hemi = new THREE.HemisphereLight(
  0xb9d5ff,   // sky – cool blue
  0x442200,   // ground – warm brown
  0.6
);
scene.add(hemi);

// 2. Sun: main shadow-casting directional light
const sun = new THREE.DirectionalLight(0xfff4e0, 2.5);
sun.position.set(8, 15, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);   // sharper shadow map
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 120;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top   =  20;
sun.shadow.bias = -0.0003;            // removes shadow acne
sun.shadow.radius = 4;               // PCF blur radius
scene.add(sun);

// 3. Fill light: opposite side, no shadow, subtle
const fill = new THREE.DirectionalLight(0x8ab4f8, 0.4);
fill.position.set(-8, 5, -6);
scene.add(fill);

// 4. Ambient: prevent totally black shadows
scene.add(new THREE.AmbientLight(0xffffff, 0.15));

// ── Ground plane (shadow receiver) ────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.ShadowMaterial({ opacity: 0.35, color: 0x000000 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Load model ────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load('https://ld4rq2xvsw.ufs.sh/f/q8qQrk2s0dynk49WtDOOPbNL1FvTKI9VyZxsaADgXeHqiwJc', (gltf) => {
  const model = gltf.scene;

  // Enable shadows on every mesh
  model.traverse((node) => {
    if (node.isMesh) {
      node.castShadow = true;
      node.receiveShadow = true;
    }
  });

  // Auto-center + auto-scale to fit camera
  const box    = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());

  model.position.sub(center);                      // center model
  model.position.y -= box.min.y - center.y;        // sit on ground

  const scale = 5 / size.length();
  model.scale.setScalar(scale);

  // Move sun shadow camera to cover model footprint
  const s = size.length() * scale * 1.2;
  ['left','bottom'].forEach(k => sun.shadow.camera[k] = -s);
  ['right','top'].forEach(k   => sun.shadow.camera[k] =  s);
  sun.shadow.camera.updateProjectionMatrix();

  camera.position.setLength(size.length() * scale * 2.2);
  controls.target.set(0, (size.y * scale) / 3, 0);
  controls.update();

  scene.add(model);

}, undefined, (err) => console.error('GLB load error:', err));

// ── Animate ───────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
